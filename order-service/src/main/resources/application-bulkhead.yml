resilience4j:
  circuitbreaker:
    instances:
      inventoryService:
        registerHealthIndicator: false
      paymentService:
        registerHealthIndicator: false
  bulkhead:
    instances:
      inventoryService:
        maxConcurrentCalls: 10
        maxWaitDuration: 100ms
      paymentService:
        maxConcurrentCalls: 10
        maxWaitDuration: 100ms
  retry:
    instances:
      inventoryService:
        maxAttempts: 1
      paymentService:
        maxAttempts: 1
