global:
  # 5s rather than the Prometheus default of 1m / a typical 15s — trials are
  # short (~7.5 min under the planned 4x4x20 design) and recovery-time is one
  # of the five core metrics, so the scrape resolution needs to be fine
  # enough to actually see when a circuit breaker closes again.
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order-service:8081']
        labels:
          service: order-service

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['inventory-service:8082']
        labels:
          service: inventory-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:8083']
        labels:
          service: payment-service

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8080']
        labels:
          service: gateway
